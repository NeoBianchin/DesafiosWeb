<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Desafio 1 – Perfil Modal</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;600;800&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>

  <style>
    /* ── Tokens ── */
    :root {
      --bg:       #0d0f14;
      --surface:  #161b26;
      --card:     #1e2535;
      --accent:   #6c63ff;
      --accent2:  #a78bfa;
      --text:     #e8eaf0;
      --muted:    #8891a8;
      --border:   rgba(108,99,255,.25);
    }

    /* ── Reset / Base ── */
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      color: var(--text);
      display: grid;
      place-items: center;
      overflow-x: hidden;
    }

    /* ── Ambient glow ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 30%, rgba(108,99,255,.18) 0%, transparent 70%),
        radial-gradient(ellipse 50% 35% at 80% 70%, rgba(167,139,250,.12) 0%, transparent 65%);
      pointer-events: none;
    }

    /* ── Container card ── */
    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 3.5rem 2.5rem;
    }

    .eyebrow {
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--accent2);
      margin-bottom: .9rem;
    }

    h1 {
      font-family: 'Sora', sans-serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800;
      line-height: 1.1;
      background: linear-gradient(135deg, #fff 30%, var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1.1rem;
    }

    .subtitle {
      color: var(--muted);
      font-size: 1.05rem;
      max-width: 380px;
      margin: 0 auto 2.4rem;
      line-height: 1.65;
    }

    /* ── CTA Button ── */
    .btn-profile {
      display: inline-flex;
      align-items: center;
      gap: .55rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-family: 'Sora', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      padding: .85rem 2.2rem;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 0 0 rgba(108,99,255,.5);
      transition: transform .2s, box-shadow .3s;
    }
    .btn-profile::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      transition: background .2s;
    }
    .btn-profile:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 8px 32px rgba(108,99,255,.55);
    }
    .btn-profile:hover::after { background: rgba(255,255,255,.08); }
    .btn-profile:active { transform: scale(.97); }

    /* pulse ring */
    .pulse-ring {
      display: inline-flex;
      border-radius: 50px;
      box-shadow: 0 0 0 0 rgba(108,99,255,.7);
      animation: pulse 2.2s infinite;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0   rgba(108,99,255,.65); }
      70%  { box-shadow: 0 0 0 14px rgba(108,99,255,0);   }
      100% { box-shadow: 0 0 0 0   rgba(108,99,255,0);    }
    }

    /* ── Modal ── */
    .modal-content {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
    }

    .modal-header {
      border-bottom: 1px solid var(--border);
      padding: 1.1rem 1.5rem;
      background: var(--surface);
    }
    .modal-title {
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      color: var(--accent2);
      letter-spacing: .04em;
    }
    .btn-close {
      filter: invert(1) brightness(.7);
    }

    .modal-body { padding: 2rem 2rem 2.5rem; }

    /* ── Avatar ── */
    .avatar-wrap {
      position: relative;
      width: 120px;
      height: 120px;
      margin: 0 auto 1.4rem;
    }
    .avatar-wrap img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid transparent;
      background: linear-gradient(var(--card), var(--card)) padding-box,
                  linear-gradient(135deg, var(--accent), var(--accent2)) border-box;
    }
    .avatar-status {
      position: absolute;
      bottom: 6px;
      right: 6px;
      width: 16px;
      height: 16px;
      background: #22c55e;
      border-radius: 50%;
      border: 2.5px solid var(--card);
    }

    /* ── Profile text ── */
    .profile-name {
      font-family: 'Sora', sans-serif;
      font-size: 1.45rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: .25rem;
    }
    .profile-role {
      font-size: .82rem;
      font-weight: 500;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--accent2);
      margin-bottom: 1.2rem;
    }
    .profile-bio {
      color: var(--muted);
      font-size: .95rem;
      line-height: 1.7;
      max-width: 320px;
      margin: 0 auto 1.6rem;
    }

    /* ── Tags ── */
    .tag-list {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: .45rem;
      margin-bottom: 1.6rem;
    }
    .tag {
      background: rgba(108,99,255,.18);
      border: 1px solid rgba(108,99,255,.3);
      color: var(--accent2);
      font-size: .75rem;
      font-weight: 600;
      padding: .3rem .75rem;
      border-radius: 50px;
    }

    /* ── Social links ── */
    .social-links {
      display: flex;
      justify-content: center;
      gap: .85rem;
    }
    .social-links a {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,.06);
      border: 1px solid var(--border);
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 1.1rem;
      text-decoration: none;
      transition: background .2s, color .2s, transform .2s;
    }
    .social-links a:hover {
      background: var(--accent);
      color: #fff;
      transform: translateY(-3px);
    }

    /* ── Divider ── */
    hr.modal-divider {
      border-color: var(--border);
      margin: 1.5rem 0;
    }
  </style>
</head>
<body>

<!-- ══ CONTAINER ══ -->
<div class="container">
  <h1>Perfil Modal</h1>
  <p class="subtitle">Clique no botão abaixo para conhecer mais sobre mim.</p>

  <span class="pulse-ring">
    <button
      class="btn-profile"
      data-bs-toggle="modal"
      data-bs-target="#perfilModal"
    >
      <i class="bi bi-person-circle"></i>
      Clique aqui ;D
    </button>
  </span>
</div>


<!-- ══ MODAL ══ -->
<div class="modal fade" id="perfilModal" tabindex="-1" aria-labelledby="perfilModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <span class="modal-title" id="perfilModalLabel">
          <i class="bi bi-person-badge me-1"></i> Perfil
        </span>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
      </div>

      <div class="modal-body text-center">

        <!-- Avatar -->
        <div class="avatar-wrap">
          <img
            src="https://64.media.tumblr.com/f635f71062d7c28619900fce58044fc5/3639052ea26d2bc9-58/s250x400/72b9541194dbeaf673e1bce84e3464a4309cdd59.png"
            alt="Foto de perfil"
          />
          <span class="avatar-status" title="Disponível"></span>
        </div>

        <!-- Nome e cargo -->
        <div class="profile-name">Neo Bianchin</div>
        <div class="profile-role">Estudante de TADS</div>

        <!-- Bio -->
        <p class="profile-bio">
          Varios estudos cis
        </p>

        <hr class="modal-divider"/>

        <!-- Tags -->
        <div class="tag-list">
          <span class="tag">HTML &amp; CSS</span>
          <span class="tag">Bootstrap</span>
        </div>
      </div><!-- /modal-body -->
    </div>
  </div>
</div>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
